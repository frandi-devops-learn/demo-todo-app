name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/demo-todo-app:${{ steps.vars.outputs.sha_short }}

      - name: Checkout manifest repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO_OWNER }}/${{ secrets.MANIFEST_REPO_NAME }}
          path: manifest-repo
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}

      - name: Update image tag in manifest
        run: |
          # Find deploy.yml dynamically
          DEPLOY_FILE=$(find manifest-repo -name "deploy.yml" -type f | head -1)
          
          if [ -z "$DEPLOY_FILE" ]; then
            echo "ERROR: deploy.yml not found"
            find manifest-repo -type f
            exit 1
          fi
          
          echo "Found: $DEPLOY_FILE"
          
          # Update image tag
          sed -i "s|image: .*/demo-todo-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/demo-todo-app:${{ steps.vars.outputs.sha_short }}|g" "$DEPLOY_FILE"
          
          # Show the change
          grep -A1 -B1 "image:" "$DEPLOY_FILE"

      - name: Commit and push changes
        working-directory: manifest-repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Update image tag to ${{ steps.vars.outputs.sha_short }} [skip ci]" || echo "No changes to commit"
          git push origin main