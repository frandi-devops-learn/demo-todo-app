apiVersion: v1
kind: Secret
metadata:
  name: demo-todo-secret
  namespace: demo-todo
type: Opaque
stringData:
  # Path for Database URL
  DATABASE_URL: "<path:secret/data/demo-todo/db#DATABASE_URL>"
  
  # Path for Telegram credentials
  TELEGRAM_BOT_TOKEN: "<path:secret/data/demo-todo/tg#TELEGRAM_BOT_TOKEN>"
  TELEGRAM_CHAT_ID: "<path:secret/data/demo-todo/tg#TELEGRAM_CHAT_ID>"