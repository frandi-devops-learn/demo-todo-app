<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Pro-Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="glass-card">
            <div class="progress-wrapper">
                <div class="progress-bar" id="task-progress" style="width: 0%"></div>
            </div>

            <header class="app-header">
                <div class="title-group">
                    <h1>> My Daily DevOps Tasks_</h1>
                    <p id="current-date">Mon, Apr 09, 2026</p>
                </div>
                <div class="status-badge" id="task-count">0 Tasks</div>
            </header>

            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-value" id="stat-total">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-pending">0</span>
                    <span class="stat-label">Pending</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-done">0</span>
                    <span class="stat-label">Done</span>
                </div>
            </div>

            <div class="input-card">
                <div class="primary-row">
                    <input type="text" id="new-todo-input" placeholder="Execute new task..." autocomplete="off">
                    <button id="add-todo-btn"><i class="fas fa-terminal"></i> <span>Run</span></button>
                </div>
                <div class="secondary-row">
                    <div class="input-group">
                        <label>_due_date</label>
                        <input type="date" id="due-date-input">
                    </div>
                    <div class="input-group">
                        <label>_priority</label>
                        <select id="priority-input">
                            <option value="1">Low</option>
                            <option value="2">Medium</option>
                            <option value="3">High</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>_category</label>
                        <input type="text" id="category-input" placeholder="e.g. AWS, SaaS">
                    </div>
                </div>
            </div>

            <div class="management-console">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="task-search" placeholder="Search by title or tag...">
                </div>
                <div class="filter-group">
                    <label for="priority-filter"><i class="fas fa-filter"></i> Prio:</label>
                    <select id="priority-filter">
                        <option value="all">All Units</option>
                        <option value="3">High Only</option>
                        <option value="2">Medium Only</option>
                        <option value="1">Low Only</option>
                    </select>
                </div>
            </div>

            <div class="list-container">
                <ul id="todo-list">
                    </ul>
            </div>

            <div class="card-footer-actions">
                <button onclick="clearCompleted()" class="clear-btn">
                    <i class="fas fa-broom"></i> Clear Finished Tasks
                </button>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p><span class="pulse-dot"></span> admin@zinlinhtet:~$ <span>Powered by Zin Lin Htet</span></p>
    </footer>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
